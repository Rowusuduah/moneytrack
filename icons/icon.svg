  <rect x="62"  y="90"  width="28" height="78" rx="6" fill="#4ade80" opacity=".9"/>
  <rect x="100" y="60"  width="28" height="108" rx="6" fill="#a78bfa" opacity=".9"/>
  <rect x="138" y="36"  width="28" height="132" rx="6" fill="#2dd4bf" opacity=".9"/>
  <!-- Trend line over columns -->
